<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneya Abacus | Daily Revision</title>
    <style>
        body {
            background-color: #165430; 
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        
        .card {
            background-color: #ffffff; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center;
            width: 90%; max-width: 400px;
        }
        
        #examSection {
            display: none; background-color: #ffffff; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 95%; max-width: 1000px;
            overflow: hidden;
        }
        
        #instructionSection { display: none; max-width: 600px; text-align: left; }
        
        #countdownOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #165430; color: #f36621; font-size: 150px; font-weight: bold;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .exam-layout { display: flex; flex-direction: row; }
        .left-panel { flex: 2; padding: 30px; }
        .right-panel { flex: 1; background-color: #f8f9fa; border-left: 2px solid #e0e0e0; padding: 30px; display: flex; flex-direction: column; }

        h2 { color: #165430; margin-bottom: 5px; }
        h3 { margin-top: 0; color: #165430; border-bottom: 2px solid #165430; padding-bottom: 10px; }
        
        ul.instructions-list { color: #555; line-height: 1.8; font-size: 16px; margin-bottom: 30px; }
        
        input[type="number"] {
            width: 100%; padding: 12px; margin-bottom: 20px; box-sizing: border-box;
            border: 2px solid #e0e0e0; border-radius: 8px; font-size: 18px; text-align: center;
        }
        
        button {
            background-color: #f36621; color: white; border: none; padding: 14px; 
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: #d8571a; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #165430; color: white; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px;
        }
        .timer { font-size: 20px; font-weight: bold; color: #f36621; }
        
        .math-container {
            font-size: 32px; font-family: monospace; font-weight: bold; display: flex; flex-direction: column;
            align-items: flex-end; width: 140px; margin: 0 auto 30px auto; line-height: 1.5;
        }
        .math-line { border-top: 4px solid #333; width: 100%; margin-top: 5px; margin-bottom: 15px; }
        
        .nav-buttons { display: flex; justify-content: space-between; gap: 15px; }
        .nav-buttons button { width: 48%; background-color: #333; }
        
        .grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            margin-bottom: 20px; flex-grow: 1; align-content: start;
        }
        .grid-btn {
            background-color: #e0e0e0; color: #555; border: 2px solid #ccc;
            padding: 10px 0; font-size: 14px; border-radius: 6px; cursor: pointer;
        }
        .grid-btn.answered { background-color: #165430; color: white; border-color: #165430; }
        .grid-btn.current { border-color: #f36621; font-weight: bold; box-shadow: 0 0 5px rgba(243,102,33,0.5); }
        
        .submit-btn { background-color: #165430; width: 100%; margin-top: auto; }
    </style>
</head>
<body>

    <div id="loginSection" class="card">
        <h2>Aneya Abacus</h2>
        <input type="number" id="mobileInput" placeholder="Enter Mobile Number">
        <button id="loginBtn" onclick="login()" style="width: 100%;">Verify Account</button>
        <p id="message" style="color: red; margin-top: 15px; display: none;"></p>
    </div>

    <div id="instructionSection" class="card">
        <h2>Exam Instructions</h2>
        <ul class="instructions-list">
            <li>15 Minutes for 10 Questions.</li>
            <li>Answered: <b>Green</b> | Unattempted: <b>Grey</b>.</li>
            <li>Click "Save & Next" to lock answers.</li>
        </ul>
        <button onclick="startCountdown()" style="width: 100%;">Start Exam</button>
    </div>

    <div id="countdownOverlay">3</div>

    <div id="examSection">
        <div class="exam-layout">
            <div class="left-panel">
                <div class="header-bar">
                    <span id="studentNameDisplay">Student</span>
                    <span class="timer" id="timerDisplay">15:00</span>
                </div>
                <h4 id="currentQInfo">Question 1 of 10</h4>
                <div class="math-container" id="mathDisplay"></div>
                <input type="number" id="answerInput" placeholder="Your Answer">
                <div class="nav-buttons">
                    <button onclick="prevQuestion()">Previous</button>
                    <button onclick="nextQuestion()">Save & Next</button>
                </div>
            </div>
            <div class="right-panel">
                <h3>Question Palette</h3>
                <div class="grid-container" id="qGrid"></div>
                <button class="submit-btn" onclick="submitExam()">Submit Exam</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCkVwFtVjdvGlRY5BqCwfxkQGMgpAq-fJpuyze3d6ANilRm2LW8QI-ITuw5zT8CfJg/exec";
        let studentData = {}, questions = [], currentIndex = 0, answers = {}, timeLeft = 900, timerInterval;

        async function login() {
            const mobile = document.getElementById('mobileInput').value;
            const msgBox = document.getElementById('message');
            if(!mobile) return;
            msgBox.style.display = "block"; msgBox.innerText = "Authenticating...";
            
            let response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", mobile: mobile }) });
            let data = await response.json();
            if(data.success) {
                studentData = data;
                let qResponse = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getQuestions", level: studentData.level }) });
                let qData = await qResponse.json();
                questions = qData.questions;
                document.getElementById('loginSection').style.display = "none";
                document.getElementById('instructionSection').style.display = "block";
            } else { msgBox.innerText = "Student not found!"; }
        }

        function startCountdown() {
            document.getElementById('instructionSection').style.display = "none";
            const cEl = document.getElementById('countdownOverlay');
            cEl.style.display = "flex";
            let count = 3;
            cEl.innerText = count;
            let interval = setInterval(() => {
                count--;
                if(count > 0) cEl.innerText = count;
                else if(count === 0) cEl.innerText = "GO!";
                else { clearInterval(interval); cEl.style.display = "none"; startExam(); }
            }, 1000);
        }

        function startExam() {
            document.getElementById('examSection').style.display = "block";
            document.getElementById('studentNameDisplay').innerText = studentData.name;
            buildGrid();
            loadQuestion(0);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function buildGrid() {
            let html = "";
            for(let i = 0; i < questions.length; i++) html += `<button class="grid-btn" id="btn-q${i}" onclick="jumpToQuestion(${i})">${i + 1}</button>`;
            document.getElementById('qGrid').innerHTML = html;
        }

        function updateGridUI() {
            for(let i = 0; i < questions.length; i++) {
                let btn = document.getElementById(`btn-q${i}`);
                btn.className = "grid-btn";
                if(answers[i]) btn.classList.add('answered');
                if(i === currentIndex) btn.classList.add('current');
            }
        }

        function loadQuestion(index) {
            currentIndex = index;
            document.getElementById('currentQInfo').innerText = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('answerInput').value = answers[currentIndex] || "";
            let nums = questions[currentIndex].sum.split(',');
            let html = "";
            nums.forEach(n => html += `<div>${n.trim()}</div>`);
            html += `<div class="math-line"></div>`;
            document.getElementById('mathDisplay').innerHTML = html;
            updateGridUI();
        }

        function jumpToQuestion(i) { saveAnswer(); loadQuestion(i); }
        function nextQuestion() { saveAnswer(); if(currentIndex < questions.length - 1) loadQuestion(currentIndex + 1); }
        function prevQuestion() { saveAnswer(); if(currentIndex > 0) loadQuestion(currentIndex - 1); }
        function saveAnswer() { answers[currentIndex] = document.getElementById('answerInput').value; }

        function updateTimer() {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(timeLeft <= 0) submitExam();
        }

        function submitExam() { clearInterval(timerInterval); alert("Exam Submitted!"); }
    </script>
</body>
</html>
