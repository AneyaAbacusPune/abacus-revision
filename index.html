<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneya Abacus | Daily Revision</title>
    <style>
        body {
            background-color: #165430; 
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h2 { color: #165430; margin-bottom: 5px; }
        p.subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
        
        input {
            width: 90%; padding: 12px; margin-bottom: 20px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 18px; text-align: center;
        }
        button {
            background-color: #f36621; color: white; border: none;
            padding: 14px; width: 100%; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: #d8571a; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Exam Interface Styles */
        #examSection { display: none; }
        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #165430; color: white; padding: 10px 15px;
            border-radius: 8px; margin-bottom: 20px;
        }
        .timer { font-size: 20px; font-weight: bold; color: #f36621; }
        
        /* The Vertical Math Display */
        .math-container {
            font-size: 28px; font-family: monospace; font-weight: bold;
            display: flex; flex-direction: column; align-items: flex-end;
            width: 120px; margin: 0 auto 20px auto; line-height: 1.5;
        }
        .math-line { border-top: 3px solid #333; width: 100%; margin-top: 5px; margin-bottom: 10px; }
        
        .nav-buttons { display: flex; justify-content: space-between; gap: 10px; }
        .nav-buttons button { width: 48%; background-color: #333; }
        .nav-buttons button:hover { background-color: #555; }
        .submit-btn { background-color: #165430; margin-top: 15px; }
        .submit-btn:hover { background-color: #0f3d22; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="card" id="loginSection">
        <h2>Aneya Abacus</h2>
        <p class="subtitle">Daily Revision Portal</p>
        <input type="number" id="mobileInput" placeholder="Enter Mobile Number">
        <button id="loginBtn" onclick="login()">Start Exam</button>
        <p id="message" style="color: red; margin-top: 15px; display: none;"></p>
    </div>

    <!-- EXAM SCREEN -->
    <div class="card" id="examSection">
        <div class="header-bar">
            <span id="studentNameDisplay">Student</span>
            <span class="timer" id="timerDisplay">15:00</span>
        </div>
        
        <h3 style="color: #666;">Question <span id="currentQNum">1</span> of <span id="totalQNum">30</span></h3>
        
        <div class="math-container" id="mathDisplay">
            <!-- Numbers will be injected here vertically -->
        </div>

        <input type="number" id="answerInput" placeholder="Your Answer">
        
        <div class="nav-buttons">
            <button onclick="prevQuestion()">Previous</button>
            <button onclick="nextQuestion()">Next</button>
        </div>
        
        <button class="submit-btn" onclick="submitExam()">Submit Exam</button>
    </div>

    <script>
        // BESTIE, PASTE YOUR GOOGLE SCRIPT URL RIGHT HERE BELOW
        const API_URL = "https://script.google.com/macros/s/AKfycbwCkVwFtVjdvGlRY5BqCwfxkQGMgpAq-fJpuyze3d6ANilRm2LW8QI-ITuw5zT8CfJg/exec";
        
        let studentData = {};
        let questions = [];
        let currentIndex = 0;
        let answers = {}; // Store student answers
        let timeLeft = 900; // 15 minutes in seconds
        let timerInterval;

        async function login() {
            const mobile = document.getElementById('mobileInput').value;
            const msgBox = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');
            
            if(!mobile) { msgBox.style.display = "block"; msgBox.innerText = "Please enter your number!"; return; }

            msgBox.style.display = "block"; msgBox.style.color = "#165430"; msgBox.innerText = "Authenticating & Loading Questions...";
            loginBtn.disabled = true;

            try {
                // 1. Login
                let response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", mobile: mobile }) });
                let data = await response.json();
                
                if(data.success) {
                    studentData = data;
                    
                    // 2. Fetch Questions based on their level
                    let qResponse = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getQuestions", level: studentData.level }) });
                    let qData = await qResponse.json();
                    
                    if(qData.success && qData.questions.length > 0) {
                        questions = qData.questions;
                        startExam();
                    } else {
                        msgBox.style.color = "red"; msgBox.innerText = "No questions found for your level!";
                        loginBtn.disabled = false;
                    }
                } else {
                    msgBox.style.color = "red"; msgBox.innerText = "Number not found. Try again!";
                    loginBtn.disabled = false;
                }
            } catch (e) {
                msgBox.style.color = "red"; msgBox.innerText = "System error. Check your connection.";
                loginBtn.disabled = false;
            }
        }

        function startExam() {
            document.getElementById('loginSection').style.display = "none";
            document.getElementById('examSection').style.display = "block";
            document.getElementById('studentNameDisplay').innerText = studentData.name;
            document.getElementById('totalQNum').innerText = questions.length;
            
            loadQuestion(0);
            
            // Start the 15 Min Timer
            timerInterval = setInterval(updateTimer, 1000);
        }

        function loadQuestion(index) {
            if(index < 0 || index >= questions.length) return;
            currentIndex = index;
            
            document.getElementById('currentQNum').innerText = currentIndex + 1;
            document.getElementById('answerInput').value = answers[currentIndex] || ""; // Load saved answer if any
            
            // Format the string "12, 15, -4" into vertical HTML
            let sumString = questions[currentIndex].sum;
            let numbersArray = sumString.split(',');
            let mathHTML = "";
            
            numbersArray.forEach(num => {
                mathHTML += `<div>${num.trim()}</div>`;
            });
            mathHTML += `<div class="math-line"></div>`;
            
            document.getElementById('mathDisplay').innerHTML = mathHTML;
        }

        function nextQuestion() {
            saveAnswer();
            if(currentIndex < questions.length - 1) {
                loadQuestion(currentIndex + 1);
            }
        }

        function prevQuestion() {
            saveAnswer();
            if(currentIndex > 0) {
                loadQuestion(currentIndex - 1);
            }
        }

        function saveAnswer() {
            answers[currentIndex] = document.getElementById('answerInput').value;
        }

        function updateTimer() {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                submitExam();
            }
        }

        function submitExam() {
            saveAnswer();
            clearInterval(timerInterval);
            // We will build the submission logic tomorrow!
            alert("Exam Submitted! (Backend grading coming soon)");
        }
    </script>
</body>
</html>
